<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Claw Code - Agent Harness Platform</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            text-align: center;
            padding: 50px;
            margin: 0;
            min-height: 100vh;
        }
        .container {
            max-width: 800px;
            margin: 0 auto;
        }
        h1 {
            font-size: 3em;
            margin-bottom: 20px;
        }
        .stats {
            display: flex;
            justify-content: center;
            gap: 30px;
            margin: 40px 0;
            flex-wrap: wrap;
        }
        .stat {
            background: rgba(255,255,255,0.1);
            padding: 20px;
            border-radius: 10px;
            backdrop-filter: blur(10px);
        }
        .number {
            font-size: 2.5em;
            font-weight: bold;
        }
        .label {
            font-size: 0.9em;
            opacity: 0.8;
        }
        .buttons {
            margin-top: 40px;
        }
        button {
            background: white;
            color: #667eea;
            border: none;
            padding: 15px 30px;
            border-radius: 25px;
            font-size: 1.1em;
            margin: 10px;
            cursor: pointer;
            transition: all 0.3s;
        }
        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(0,0,0,0.2);
        }
        .footer {
            margin-top: 60px;
            opacity: 0.7;
            font-size: 0.9em;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🦀 Claw Code</h1>
        <p>Agent Harness Platform - Python & Rust Workspace</p>

        <div class="stats">
            <div class="stat">
                <div class="number">67</div>
                <div class="label">Python Files</div>
            </div>
            <div class="stat">
                <div class="number">207</div>
                <div class="label">Commands</div>
            </div>
            <div class="stat">
                <div class="number">184</div>
                <div class="label">Tools</div>
            </div>
        </div>

        <div class="buttons">
            <button onclick="window.open('https://github.com/neshop8/claw-code', '_blank')">
                📍 View on GitHub
            </button>
            <button onclick="window.open('https://github.com/neshop8/claw-code/tree/main/src', '_blank')">
                🐍 Python Source
            </button>
            <button onclick="window.open('https://github.com/neshop8/claw-code/tree/main/rust', '_blank')">
                🦀 Rust Source
            </button>
        </div>

        <div class="footer">
            <p>Built with Python, Rust, Docker & GitHub Actions</p>
            <p>Last updated: April 3, 2026</p>
        </div>
    </div>

    <script>
        // Simple test to ensure JavaScript works
        console.log('Claw Code page loaded successfully!');
    </script>
</body>
</html>
