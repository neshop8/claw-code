name: Build Rust Release

on:
  push:
    branches: [ main, dev ]
    tags: ['v*']
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            artifact_name: claw
            asset_name: claw-linux-x86_64
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            artifact_name: claw.exe
            asset_name: claw-windows-x86_64.exe
          - os: macos-latest
            target: x86_64-apple-darwin
            artifact_name: claw
            asset_name: claw-macos-x86_64

    steps:
    - uses: actions/checkout@v3
    
    - name: Install Rust
      uses: actions-rs/toolchain@v1
      with:
        profile: minimal
        toolchain: stable
        override: true
    
    - name: Build
      run: |
        cd rust
        cargo build --release -p claw-cli
    
    - name: Upload artifact
      uses: actions/upload-artifact@v3
      with:
        name: ${{ matrix.asset_name }}
        path: rust/target/release/${{ matrix.artifact_name }}
